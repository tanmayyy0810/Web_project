<!DOCTYPE html>
<html>
<head>
    <title>Fixed Header z-index Test</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }
        header {
            position: fixed;
            top: 0;
            width: 100%;
            background: #222;
            color: white;
            padding: 15px;
            text-align: center;
            z-index: 100; /* Always on top */
        }
        .content {
            margin-top: 80px; 
        }
        .box {
            position: relative;
            height: 300px;
            margin: 20px;
            padding: 20px;
            color: white;
            font-size: 20px;
        }
        .box1 {
            background: #ff6b6b;
            z-index: 1;
        }
        .box2 {
            background: #4ecdc4;
            z-index: 2;
        }
        .box3 {
            background: #1a73e8;
            z-index: 3;
        }
        .box4 {
            background: #9b59b6;
            z-index: 50; 
        }
    </style>
</head>
<body>
<header>
    Fixed Header (z-index: 100)
</header>
<div class="content">
    <div class="box box1">
        Box 1 (z-index: 1)
    </div>
    <div class="box box2">
        Box 2 (z-index: 2)
    </div>
    <div class="box box3">
        Box 3 (z-index: 3)
    </div>
    <div class="box box4">
        Box 4 (z-index: 50 — Test Case)
    </div>
</div>
</body>
</html>
