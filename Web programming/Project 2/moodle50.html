<!DOCTYPE html>
<html>
<head>
    <title>Fade Image on Hover</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        .box {
            width: 300px;
        }
        .box img {
            width: 100%;
            transition: opacity 0.3s;
        }
    </style>
</head>
<body>
    <div class="box">
        <h3>Tanmay Rastogi</h3>
        <p>Hover over this to fade the image.</p>
        <img src="im\tanmay.jpeg" alt="Tanmay's photo">
    </div>
    <script>
        $(document).ready(function() {
            $(".box").mouseenter(function() {
                $(this).find("img").css("opacity", "0.5");
            });
            $(".box").mouseleave(function() {
                $(this).find("img").css("opacity", "1");
            });
        });
    </script>

</body>
</html>
