<!DOCTYPE html>
<html>
<head>
    <title>Login/Register</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: grey;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 50px; 
            padding: 50px ;
        }
        .form-container {
            background-color: whitesmoke ;
            width: 400px;
            border-radius: 15px; 
            overflow: hidden;
            padding: 0;
        }
        .login-padding {
            padding: 30px;
        }
        .login-header {
            text-align: center;
            margin-bottom: 20px;
        }
        .reg-header {
            background-color: palevioletred; 
            color: white;
            padding: 20px;
            text-align: center;
        }
        .reg-body {
            background-color: whitesmoke; 
            padding: 30px;
        }
        .input-group {
            margin-bottom: 15px;
        }
        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #555;
        }
        input[type="text"], 
        input[type="email"], 
        input[type="password"] {
            width: 350px;
            padding: 12px;
            border: 1px solid dimgrey;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
        }

        .inline-group {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }

        .radio-options {
            display: flex;
            gap: 20px;
            margin-top: 5px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .login-btn { background-color: palevioletred; color: white; }
        .reg-btn { background-color: palevioletred; color: white; }

        .login-btn:hover { background-color: slategrey; }
        .reg-btn:hover { background-color: slategrey; }

    </style>
</head>
<body>

    <div class="form-container">
        <div class="login-padding">
            <div class="login-header">
                <h2>Login</h2>
            </div>
            <form>
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" placeholder="Enter Username" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" placeholder="Enter Password" required>
                </div>
                <div class="inline-group">
                    <input type="checkbox" id="remember">
                    <label for="remember">Remember me</label>
                </div><br>
                <button type="submit" class="btn login-btn">Login</button>
            </form>
        </div>
    </div>

    <div class="form-container">
        <div class="reg-header">
            <h2 style="margin:0;">Register</h2>
        </div>
        <div class="reg-body">
            <form>
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="Full Name" required>
                </div>
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" placeholder="Tanmay@example.com" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" placeholder="Create Password" required>
                </div>
                <div class="input-group">
                    <label>Confirm Password</label>
                    <input type="password" placeholder="Confirm Password" required>
                </div>
                <div class="input-group">
                    <label>Gender</label>
                    <div class="radio-options">
                        <label><input type="radio" name="gender" required> Male</label>
                        <label><input type="radio" name="gender"> Female</label>
                        <label><input type="radio" name="gender"> Other</label>
                    </div>
                </div>
                <button type="submit" class="btn reg-btn">Register</button>
            </form>
        </div>
    </div>

</body>
</html>
