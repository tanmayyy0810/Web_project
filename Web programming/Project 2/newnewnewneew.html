<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JS Events Master</title>

<style>
    body {
        font-family: Arial;
        padding: 30px;
        background: #f2f2f2;
    }

    .box {
        padding: 20px;
        background: white;
        margin-bottom: 20px;
        border-radius: 10px;
    }

    button {
        padding: 10px;
        margin-top: 10px;
        cursor: pointer;
    }

    input {
        padding: 8px;
        margin-top: 10px;
        width: 100%;
    }

    #hoverBox {
        height: 100px;
        background: lightblue;
        text-align: center;
        line-height: 100px;
    }
</style>
</head>

<body>

<h2>JavaScript Events Demo</h2>

<!-- CLICK EVENT -->
<div class="box">
    <h3>Click Event</h3>
    <button onclick="handleClick()">Click Me</button>
</div>

<!-- DOUBLE CLICK -->
<div class="box">
    <h3>Double Click Event</h3>
    <button ondblclick="handleDoubleClick()">Double Click Me</button>
</div>

<!-- MOUSE EVENTS -->
<div class="box">
    <h3>Mouse Events</h3>
    <div id="hoverBox">Hover Over Me</div>
</div>

<!-- KEYBOARD EVENTS -->
<div class="box">
    <h3>Keyboard Events</h3>
    <input type="text" id="keyInput" placeholder="Type something">
    <p id="keyOutput"></p>
</div>

<!-- INPUT EVENT -->
<div class="box">
    <h3>Input Event (Live)</h3>
    <input type="text" id="liveInput" placeholder="Live typing...">
    <p id="liveText"></p>
</div>

<!-- CHANGE EVENT -->
<div class="box">
    <h3>Change Event</h3>
    <select id="dropdown">
        <option value="">Select</option>
        <option>HTML</option>
        <option>CSS</option>
        <option>JS</option>
    </select>
    <p id="selected"></p>
</div>

<!-- FORM SUBMIT -->
<div class="box">
    <h3>Form Submit Event</h3>
    <form id="form">
        <input type="text" id="name" placeholder="Enter name">
        <button type="submit">Submit</button>
    </form>
</div>

<!-- WINDOW EVENTS -->
<div class="box">
    <h3>Window Events</h3>
    <p>Resize window or scroll page</p>
</div>

<script>

// CLICK
function handleClick() {
    alert("Button Clicked!");
}

// DOUBLE CLICK
function handleDoubleClick() {
    alert("Double Clicked!");
}

// MOUSE EVENTS
let box = document.getElementById("hoverBox");

box.addEventListener("mouseover", function() {
    box.style.background = "orange";
    box.innerText = "Mouse Over";
});

box.addEventListener("mouseout", function() {
    box.style.background = "lightblue";
    box.innerText = "Mouse Out";
});

// KEYBOARD EVENTS
let keyInput = document.getElementById("keyInput");

keyInput.addEventListener("keydown", function(e) {
    document.getElementById("keyOutput").innerText =
        "Key Pressed: " + e.key;
});

// INPUT EVENT
document.getElementById("liveInput")
.addEventListener("input", function(e) {
    document.getElementById("liveText").innerText = e.target.value;
});

// CHANGE EVENT
document.getElementById("dropdown")
.addEventListener("change", function() {
    document.getElementById("selected").innerText =
        "Selected: " + this.value;
});

// FORM SUBMIT
document.getElementById("form")
.addEventListener("submit", function(e) {
    e.preventDefault();
    let name = document.getElementById("name").value;
    alert("Hello " + name);
});

// WINDOW EVENTS
window.addEventListener("resize", function() {
    console.log("Window resized");
});

window.addEventListener("scroll", function() {
    console.log("Scrolling...");
});

</script>

</body>
</html>
