<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleek Login & Register</title>
    <style>
        /* --- Base Setup --- */
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-color: #0C0420; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        /* --- 1. The Flowing Wave Background --- */
        #dynamic-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1; 
            background: linear-gradient(-45deg, #0C0420, #034d3b);
            background-size: 400% 400%;
            animation: gradientWave 10s ease infinite; 
        }
        @keyframes gradientWave {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- 2. Parallax Stars --- */
        .stars-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2; 
        }
        .star {
            position: absolute;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 5px 1px rgba(255, 255, 255, 0.6);
            animation: twinkle 3s infinite alternate;
        }
        @keyframes twinkle {
            0% { opacity: 0.3; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        /* --- 3. Forms Layout Wrapper --- */
        .forms-wrapper {
            position: relative;
            z-index: 10;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 40px;
            padding: 50px 20px;
            width: 100%;
            max-width: 1000px;
        }

        /* --- Progress Bar --- */
        .instruction-bar {
            width: 100%;
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 12px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 10px;
        }
        .instruction-bar p {
            margin: 0 0 10px 0;
            font-size: 1.1rem;
            color: #0e9f7b;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .progress-container {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }
        .progress-bar {
            width: 0%;
            height: 100%;
            background: #0e9f7b;
            transition: width 0.5s ease;
        }

        /* --- 4. Glassmorphism Form Containers --- */
        .form-container {
            background-color: rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 400px;
            border-radius: 16px; 
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- Form Headers --- */
        .form-header {
            text-align: center;
            padding: 25px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(0, 0, 0, 0.15);
        }
        .form-header h2 {
            margin: 0;
            font-weight: 300;
            letter-spacing: 2px;
            font-size: 1.8rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .form-body {
            padding: 30px;
        }

        /* --- Form Inputs --- */
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 400;
            font-size: 0.9rem;
            color: #d1d1d1;
            letter-spacing: 0.5px;
        }
        input[type="text"], 
        input[type="email"], 
        input[type="password"] {
            width: 100%;
            padding: 14px 15px;
            background-color: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
            color: white;
            font-family: inherit;
            transition: all 0.3s ease;
        }
        input[type="text"]::placeholder, 
        input[type="email"]::placeholder, 
        input[type="password"]::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        input[type="text"]:focus, 
        input[type="email"]:focus, 
        input[type="password"]:focus {
            outline: none;
            border-color: #0e9f7b;
            background-color: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 10px rgba(14, 159, 123, 0.3);
        }

        /* --- Checkboxes & Radios --- */
        .inline-group {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            color: #d1d1d1;
            margin-bottom: 25px;
        }
        .radio-options {
            display: flex;
            gap: 20px;
            margin-top: 8px;
            color: #d1d1d1;
            font-size: 0.9rem;
        }
        .radio-options label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            margin: 0;
            color: inherit;
        }

        /* --- Buttons --- */
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }
        .btn-theme {
            background-color: #0e9f7b;
            color: white;
            box-shadow: 0 4px 15px rgba(14, 159, 123, 0.3);
        }
        .btn-theme:hover {
            background-color: #085e37;
            box-shadow: 0 6px 20px rgba(14, 159, 123, 0.5);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div id="dynamic-gradient"></div>
    <div class="stars-layer"></div>

    <div class="forms-wrapper">
        
        <div class="instruction-bar">
            <p id="status-text">Please fill out <strong>both</strong> the Login and Register forms to continue.</p>
            <div class="progress-container">
                <div class="progress-bar" id="completion-progress"></div>
            </div>
        </div>

        <div class="form-container">
            <div class="form-header">
                <h2>Login</h2>
            </div>
            <div class="form-body">
                <form id="login-form">
                    <div class="input-group">
                        <label>Username</label>
                        <input type="text" placeholder="Enter Username" required>
                    </div>
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" placeholder="Enter Password" required>
                    </div>
                    <div class="inline-group">
                        <input type="checkbox" id="remember">
                        <label for="remember" style="margin:0;">Remember me</label>
                    </div>
                    <button type="submit" class="btn btn-theme">Login</button>
                </form>
            </div>
        </div>

        <div class="form-container">
            <div class="form-header">
                <h2>Register</h2>
            </div>
            <div class="form-body">
                <form id="register-form">
                    <div class="input-group">
                        <label>Full Name</label>
                        <input type="text" placeholder="Full Name" required>
                    </div>
                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" placeholder="tanmay@example.com" required>
                    </div>
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" placeholder="Create Password" required>
                    </div>
                    <div class="input-group">
                        <label>Confirm Password</label>
                        <input type="password" placeholder="Confirm Password" required>
                    </div>
                    <div class="input-group">
                        <label>Gender</label>
                        <div class="radio-options">
                            <label><input type="radio" name="gender" required> Male</label>
                            <label><input type="radio" name="gender"> Female</label>
                            <label><input type="radio" name="gender"> Other</label>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-theme">Register</button>
                </form>
            </div>
        </div>

    </div>

    <script>
        // State tracking
        let isLoginDone = false;
        let isRegisterDone = false;

        const progressBar = document.getElementById('completion-progress');
        const statusText = document.getElementById('status-text');

        function updateProgress() {
            let completion = 0;
            if (isLoginDone) completion += 50;
            if (isRegisterDone) completion += 50;

            progressBar.style.width = completion + "%";

            if (completion === 100) {
                statusText.innerHTML = "✨ All set! Redirecting to the next part...";
                statusText.style.color = "#ffffff";
                
                setTimeout(() => {
                    alert("Both forms verified! Proceeding to the dashboard...");
                    // This is where the magic happens:
                    window.location.href = "index.html"; 
                }, 800);
            } else if (completion === 50) {
                statusText.innerHTML = "Halfway there! Now fill the <strong>other</strong> form.";
            }
        }

        // --- Login Form Logic ---
        const loginForm = document.getElementById('login-form');
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            // Only validate if it hasn't been completed yet
            if (isLoginDone) {
                alert("You've already completed the Login form!");
                return;
            }

            const user = loginForm.querySelector('input[type="text"]').value;
            const pass = loginForm.querySelector('input[type="password"]').value;

            if (user.length >= 3 && pass.length >= 7) {
                isLoginDone = true;
                alert("✅ Login form validated!");
                
                // Visual feedback: disable button
                const btn = loginForm.querySelector('button');
                btn.style.backgroundColor = "#555";
                btn.innerText = "Completed";
                btn.disabled = true;

                updateProgress();
            } else {
                alert("❌ Please enter a valid username and password (at least 3 characters for username and 7 for password).");
            }
        });

        // --- Register Form Logic ---
        const registerForm = document.getElementById('register-form');
        registerForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            // Only validate if it hasn't been completed yet
            if (isRegisterDone) {
                alert("You've already completed the Register form!");
                return;
            }

            const pass = registerForm.querySelector('input[placeholder="Create Password"]').value;
            const confirmPass = registerForm.querySelector('input[placeholder="Confirm Password"]').value;

            if (pass !== confirmPass) {
                alert("❌ Registration failed: Passwords do not match.");
            } else if (pass.length < 6) {
                alert("❌ Registration failed: Password must be at least 6 characters.");
            } else {
                isRegisterDone = true;
                alert("✅ Registration form validated!");
                
                // Visual feedback: disable button
                const btn = registerForm.querySelector('button');
                btn.style.backgroundColor = "#555";
                btn.innerText = "Completed";
                btn.disabled = true;

                updateProgress();
            }
        });
    </script>

</body>
</html>
