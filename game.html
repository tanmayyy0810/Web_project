<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Glass Memory Game</title>
    <style>
        /* --- Base Setup --- */
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-color: #0C0420; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        #dynamic-gradient {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%; z-index: 1; 
            background: linear-gradient(-45deg, #0C0420, #034d3b);
            background-size: 400% 400%;
            animation: gradientWave 10s ease infinite; 
        }
        @keyframes gradientWave {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .stars-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }
        .star {
            position: absolute; border-radius: 50%; background-color: rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 5px 1px rgba(255, 255, 255, 0.6); animation: twinkle 3s infinite alternate;
        }
        @keyframes twinkle { 0% { opacity: 0.3; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1.2); } }

        /* --- Game Header --- */
        .header {
            position: relative; z-index: 10; text-align: center; margin-bottom: 20px;
        }
        .header h1 { margin: 0; font-weight: 300; letter-spacing: 2px; font-size: 2.5rem; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .header p { color: #0e9f7b; font-size: 1.2rem; margin-top: 5px; }

        /* --- Memory Grid --- */
        .memory-game {
            position: relative;
            z-index: 10;
            width: 400px;
            height: 400px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            perspective: 1000px; /* This gives the 3D depth to the flips */
        }

        /* --- Card Styles --- */
        .memory-card {
            position: relative;
            cursor: pointer;
            transform-style: preserve-3d;
            transform: scale(1);
            transition: transform 0.5s cubic-bezier(0.4, 0.0, 0.2, 1);
        }
        
        .memory-card:active { transform: scale(0.95); transition: transform 0.2s; }
        .memory-card.flip { transform: rotateY(180deg); }

        .front-face, .back-face {
            width: 100%; height: 100%;
            position: absolute;
            border-radius: 12px;
            background-color: rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            backface-visibility: hidden; /* Hides the back of the element when flipped */
            display: flex; justify-content: center; align-items: center;
            font-size: 2.5rem;
        }

        /* The Front visually (but technically the back of the card element) */
        .front-face {
            transform: rotateY(180deg);
            background-color: rgba(14, 159, 123, 0.15); /* Neon tint when matched/flipped */
            border-color: #0e9f7b;
            box-shadow: 0 0 15px rgba(14, 159, 123, 0.4);
        }

        /* The Back visually (what you see before flipping) */
        .back-face {
            color: #d1d1d1;
            font-size: 1.5rem;
            transition: all 0.3s ease;
        }
        .memory-card:hover .back-face { border-color: rgba(255,255,255,0.4); }

    </style>
</head>
<body>
    <div id="dynamic-gradient"></div>
    <div class="stars-layer" id="stars-container"></div>

    <div class="header">
        <h1>Neon Memory</h1>
        <p id="moves">Moves: 0</p>
    </div>

    <div class="memory-game" id="grid">
        </div>

    <script>
        // --- Background Stars ---
        function createStars() {
            const container = document.getElementById('stars-container');
            for (let i = 0; i < 50; i++) {
                let star = document.createElement('div');
                star.className = 'star';
                star.style.width = Math.random() * 3 + 'px';
                star.style.height = star.style.width;
                star.style.left = Math.random() * 100 + 'vw';
                star.style.top = Math.random() * 100 + 'vh';
                star.style.animationDelay = Math.random() * 2 + 's';
                container.appendChild(star);
            }
        }
        createStars();

        // --- Game Logic ---
        const emojis = ['🚀', '👾', '💎', '🔥', '⚡', '🌙', '🎧', '🎮'];
        // Duplicate array to make pairs, then shuffle
        const cardsArray = [...emojis, ...emojis].sort(() => 0.5 - Math.random()); 

        const grid = document.getElementById('grid');
        const movesDisplay = document.getElementById('moves');
        
        let hasFlippedCard = false;
        let lockBoard = false;
        let firstCard, secondCard;
        let moves = 0;
        let matchedPairs = 0;

        // Generate Cards
        cardsArray.forEach(emoji => {
            const card = document.createElement('div');
            card.classList.add('memory-card');
            card.dataset.emoji = emoji;

            card.innerHTML = `
                <div class="front-face">${emoji}</div>
                <div class="back-face">?</div>
            `;
            
            card.addEventListener('click', flipCard);
            grid.appendChild(card);
        });

        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return; // Prevent double clicking same card

            this.classList.add('flip');

            if (!hasFlippedCard) {
                // First click
                hasFlippedCard = true;
                firstCard = this;
                return;
            }

            // Second click
            secondCard = this;
            moves++;
            movesDisplay.innerText = `Moves: ${moves}`;
            checkForMatch();
        }

        function checkForMatch() {
            let isMatch = firstCard.dataset.emoji === secondCard.dataset.emoji;

            isMatch ? disableCards() : unflipCards();
        }

        function disableCards() {
            firstCard.removeEventListener('click', flipCard);
            secondCard.removeEventListener('click', flipCard);
            
            matchedPairs++;
            if(matchedPairs === 8) {
                setTimeout(() => alert(`You won in ${moves} moves! Refresh to play again.`), 500);
            }

            resetBoard();
        }

        function unflipCards() {
            lockBoard = true; // Lock so you can't click a 3rd card during animation
            setTimeout(() => {
                firstCard.classList.remove('flip');
                secondCard.classList.remove('flip');
                resetBoard();
            }, 1000); // 1 second delay
        }

        function resetBoard() {
            [hasFlippedCard, lockBoard] = [false, false];
            [firstCard, secondCard] = [null, null];
        }
    </script>
</body>
</html>
