<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassmorphism Z-Index Gallery</title>
    <style>
        /* --- Base Setup --- */
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-color: #0C0420; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        /* --- 1. The Flowing Wave Background --- */
        #dynamic-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1; 
            background: linear-gradient(-45deg, #0C0420, #034d3b);
            background-size: 400% 400%;
            animation: gradientWave 10s ease infinite; 
        }
        @keyframes gradientWave {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- 2. Parallax Stars --- */
        .stars-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2; 
            pointer-events: none; /* Let clicks pass through */
        }
        .star {
            position: absolute;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 5px 1px rgba(255, 255, 255, 0.6);
            animation: twinkle 3s infinite alternate;
        }
        @keyframes twinkle {
            0% { opacity: 0.3; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        /* --- 3. Glassmorphism Wrapper --- */
        .glass-card {
            position: relative;
            z-index: 10;
            background-color: rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 16px; 
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .glass-card h2 {
            margin: 0 0 30px 0;
            font-weight: 300;
            letter-spacing: 2px;
            font-size: 2rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        /* --- 4. Gallery Container --- */
        .gallery {
            position: relative;
            /* Expanded container to fit 6 images */
            width: 450px; 
            height: 350px; 
        }

        /* --- 5. Image Styling --- */
        .gallery img {
            position: absolute;
            width: 200px;
            height: 150px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            /* Added border and shadow for the glass theme */
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: -5px 10px 20px rgba(0, 0, 0, 0.5);
            object-fit: cover;
            background-color: #1a1a1a; /* fallback if image doesn't load immediately */
        }
        
        .gallery img:hover {
            transform: scale(1.08) translateY(-5px);
            box-shadow: -8px 15px 25px rgba(14, 159, 123, 0.4);
            border-color: #0e9f7b;
        }

        /* Stack Positioning for 6 images */
        .img1 { left: 0px;   top: 0px;   z-index: 1; }
        .img2 { left: 40px;  top: 30px;  z-index: 2; }
        .img3 { left: 80px;  top: 60px;  z-index: 3; }
        .img4 { left: 120px; top: 90px;  z-index: 4; }
        .img5 { left: 160px; top: 120px; z-index: 5; }
        .img6 { left: 200px; top: 150px; z-index: 6; }

    </style>
</head>
<body>

    <div id="dynamic-gradient"></div>
    <div class="stars-layer" id="stars-container"></div>

    <div class="glass-card">
        <h2>Interactive Gallery</h2>
        <div class="gallery">
            <img src="im/gucci.jpg" class="img1" data-original="1" onerror="this.src='im/no_image.jpg'">
            <img src="im/nike.jpg" class="img2" data-original="2" onerror="this.src='im/no_image.jpg'">
            <img src="im/headphoneesss.webp" class="img3" data-original="3" onerror="this.src='im/no_image.jpg'">
            
            <img src="im/tikka.jpg" class="img4" data-original="4" onerror="this.src='im/no_image.jpg'">
            <img src="im/pav.jpg" class="img5" data-original="5" onerror="this.src='im/no_image.jpg'">
            <img src="im/chhole.jpg" class="img6" data-original="6" onerror="this.src='im/no_image.jpg'">
        </div>
    </div>

    <script>
        // --- 1. Generate Background Stars ---
        function createStars() {
            const container = document.getElementById('stars-container');
            for (let i = 0; i < 50; i++) {
                let star = document.createElement('div');
                star.className = 'star';
                star.style.width = Math.random() * 3 + 'px';
                star.style.height = star.style.width;
                star.style.left = Math.random() * 100 + 'vw';
                star.style.top = Math.random() * 100 + 'vh';
                star.style.animationDelay = Math.random() * 2 + 's';
                container.appendChild(star);
            }
        }
        createStars();

        // --- 2. Z-Index Gallery Logic ---
        const images = document.querySelectorAll(".gallery img");
        
        images.forEach(img => {
            img.addEventListener("click", function() {
                // Reset all images to their original z-index
                images.forEach(image => {
                    image.style.zIndex = image.dataset.original;
                    // Optional: remove a class if you want to dim non-selected ones
                    image.style.filter = "brightness(0.6)"; 
                });
                
                // Bring clicked image to front and brighten it
                this.style.zIndex = "20";
                this.style.filter = "brightness(1.1)";
            });
            
            // Set initial state
            img.style.filter = "brightness(0.8)";
        });

        // Make the top image (img6) fully bright by default
        document.querySelector('.img6').style.filter = "brightness(1.1)";
    </script>

</body>
</html>
